services:
  - type: web
    name: carsale-1
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: npm install && npm run build --workspace apps/api
    startCommand: npm run start --workspace apps/api
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: carsale
      - key: CLIENT_ORIGIN
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: ADMIN_INITIAL_NAME
        value: Carsale Administrator
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: JPCENTER_USERNAME
        sync: false
      - key: JPCENTER_PASSWORD
        sync: false
      - key: SCRAPER_SERVICE_KEY
        sync: false
      - key: SCRAPER_BOT_ENABLED
        value: "true"
      - key: SCRAPER_SCHEDULE_LABEL
        value: Every 6 hours
      - key: SCRAPER_JOB_DELAY_MS
        value: "2000"
      - key: SCRAPER_JOB_RETRY_DELAY_MS
        value: "5000"
      - key: JPY_TO_LKR
        value: "2.08"
      - key: DEFAULT_FREIGHT_JPY
        value: "220000"
      - key: DEFAULT_INSURANCE_JPY
        value: "50000"
      - key: DEFAULT_BANK_CHARGES_LKR
        value: "45000"
      - key: DEFAULT_CLEARING_CHARGES_LKR
        value: "220000"
      - key: DEFAULT_IMPORTER_COMMISSION_LKR
        value: "220000"
      - key: DEFAULT_LOCAL_TRANSPORT_LKR
        value: "95000"
  - type: cron
    name: carsale-jpcenter-scraper
    runtime: node
    plan: starter
    schedule: "0 */6 * * *"
    buildCommand: npm install
    startCommand: npm run scraper:run
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SCRAPER_API_URL
        value: https://carsale-1.onrender.com/api
      - key: SCRAPER_SERVICE_KEY
        sync: false
      - key: SCRAPER_RUN_TIMEOUT_MS
        value: "1800000"
